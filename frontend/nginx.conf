# HTTP server - redirects all traffic to HTTPS
server {
  listen 8080;
  server_name localhost;
  server_tokens off;

  # Redirect all HTTP requests to HTTPS
  return 301 https://$host$request_uri;
}

# HTTPS server
server {
  listen 8443 ssl;
  http2 on;
  server_name localhost;
  server_tokens off;
  client_max_body_size 50M;

  # SSL certificate paths (will be mounted from Docker volume)
  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;

  # Security headers (shared via include)
  include /etc/nginx/conf.d/security-headers.conf;

  root /usr/share/nginx/html;
  index index.html;
  autoindex off;

  # Hashed static assets (JS/CSS) — immutable, cache 1 year
  location /assets/ {
    include /etc/nginx/conf.d/security-headers.conf;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  # Proxy image requests to the backend — cache 1 day
  location /images/ {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
    expires 1d;
    add_header Cache-Control "public" always;
  }

  # SPA fallback — no cache (needs fresh for deploys)
  location / {
    include /etc/nginx/conf.d/security-headers.conf;
    try_files $uri /index.html;
    add_header Cache-Control "no-cache" always;
  }

  # Health check endpoint
  location /health {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API — no store
  location /api/ {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
    add_header Cache-Control "no-store" always;
  }
}