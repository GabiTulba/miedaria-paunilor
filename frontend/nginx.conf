# HTTP server - redirects all traffic to HTTPS, preserving Host so the HTTPS
# layer can apply per-host canonical logic (www -> apex).
server {
  listen 8080 default_server;
  server_name miedaria-paunilor.ro www.miedaria-paunilor.ro localhost;
  server_tokens off;

  return 301 https://$host$request_uri;
}

# HTTPS server - canonical apex + localhost (default_server for unknown SNI /
# in-container healthchecks).
server {
  listen 8443 ssl default_server;
  http2 on;
  server_name miedaria-paunilor.ro localhost;
  server_tokens off;
  client_max_body_size 50M;

  # SSL certificate paths (will be mounted from Docker volume)
  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;

  # Compression - gzip + brotli for text-like assets. Skip pre-compressed image
  # bytes (PNG/JPEG/WebP) and binary types.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types
    text/plain text/css text/xml application/xml application/xml+rss
    application/json application/javascript application/x-javascript
    application/rss+xml image/svg+xml font/ttf font/otf;

  brotli on;
  brotli_comp_level 5;
  brotli_types
    text/plain text/css text/xml application/xml application/xml+rss
    application/json application/javascript application/x-javascript
    application/rss+xml image/svg+xml font/ttf font/otf;

  # Security headers (shared via include)
  include /etc/nginx/conf.d/security-headers.conf;

  root /usr/share/nginx/html;
  index index.html;
  autoindex off;

  # Hashed static assets (JS/CSS) — immutable, cache 1 year
  location /assets/ {
    include /etc/nginx/conf.d/security-headers.conf;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  # Proxy image requests to the backend — cache 1 day
  location /images/ {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
    expires 1d;
    add_header Cache-Control "public" always;
  }

  # Blog RSS feed - proxied from backend, served at the public root so feeds
  # land on https://miedaria-paunilor.ro/blog/rss.xml without falling into the
  # SPA fallback.
  location = /blog/rss.xml {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000/blog/rss.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Legacy /home URL — permanently redirect to canonical "/"
  location = /home {
    return 301 /;
  }

  # Legacy unprefixed paths from before the /:lang routing refactor — 301 into
  # /ro/... so previously-indexed inbound links survive. The optional second
  # capture preserves trailing slug/id segments (e.g. /shop/abc -> /ro/shop/abc).
  location ~ ^/(shop|blog|about-us|contact|cart)(/.*)?$ {
    return 301 /ro/$1$2;
  }

  # RFC 9116 well-known endpoints — plain text, must not hit SPA fallback
  location ^~ /.well-known/ {
    include /etc/nginx/conf.d/security-headers.conf;
    default_type text/plain;
    try_files $uri =404;
  }

  # SPA fallback — no cache (needs fresh for deploys)
  location / {
    include /etc/nginx/conf.d/security-headers.conf;
    try_files $uri /index.html;
    add_header Cache-Control "no-cache" always;
  }

  # Health check endpoint
  location /health {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API — no store
  location /api/ {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
    add_header Cache-Control "no-store" always;
  }
}

# HTTPS server - www -> apex 301. Reuses the same cert (production cert must
# carry both SANs).
server {
  listen 8443 ssl;
  http2 on;
  server_name www.miedaria-paunilor.ro;
  server_tokens off;

  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;

  return 301 https://miedaria-paunilor.ro$request_uri;
}
