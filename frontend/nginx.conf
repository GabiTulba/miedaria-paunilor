# ---- http-context directives (this file is included at http {} via conf.d) ----

# Per-IP rate-limit zones, applied to /api/ and /images/ locations below.
# 10MB shared memory per zone holds ~160k IPs.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=images:10m rate=20r/s;

# Language selection for the root `/` redirect. Prefer an explicit `lang`
# cookie (written by the SPA on language switch); fall back to Accept-Language.
# Default matches the FE's detectInitialLang fallback ('en').
map $cookie_lang $cookie_lang_normalized {
  default "";
  "en"    "en";
  "ro"    "ro";
}
map $http_accept_language $accept_lang {
  default "en";
  ~*^ro   "ro";
  ~*^en   "en";
}
map $cookie_lang_normalized $preferred_lang {
  default $accept_lang;
  "en"    "en";
  "ro"    "ro";
}

# Structured access log so anything beyond `docker logs | tail` can parse it.
log_format json_combined escape=json
  '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
  '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
  '"rt":$request_time,"ua":"$http_user_agent","ref":"$http_referer"}';

# HTTP server - redirects all traffic to HTTPS, preserving Host so the HTTPS
# layer can apply per-host canonical logic (www -> apex).
server {
  listen 8080 default_server;
  server_name miedaria-paunilor.ro www.miedaria-paunilor.ro localhost;
  server_tokens off;

  return 301 https://$host$request_uri;
}

# HTTPS server - canonical apex + localhost (default_server for unknown SNI /
# in-container healthchecks).
server {
  listen 8443 ssl default_server;
  http2 on;
  server_name miedaria-paunilor.ro localhost;
  server_tokens off;

  # Emit relative Location headers so nginx doesn't bake the container's
  # internal listen port (8443) into redirects served behind a port-mapped
  # host (host:443 -> container:8443). The browser resolves the relative
  # target against the original request URL.
  absolute_redirect off;

  # Default request body cap — narrow. The admin image-upload location below
  # overrides this to 50M; everything else (JSON CRUD, search, etc.) is small.
  client_max_body_size 256k;

  access_log /var/log/nginx/access.log json_combined;

  # SSL certificate paths (will be mounted from Docker volume)
  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;

  # Compression - gzip + brotli for text-like assets. Skip pre-compressed image
  # bytes (PNG/JPEG/WebP) and binary types.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types
    text/plain text/css text/xml application/xml application/xml+rss
    application/json application/javascript application/x-javascript
    application/rss+xml image/svg+xml font/ttf font/otf;

  brotli on;
  brotli_comp_level 5;
  brotli_types
    text/plain text/css text/xml application/xml application/xml+rss
    application/json application/javascript application/x-javascript
    application/rss+xml image/svg+xml font/ttf font/otf;

  # Security headers (shared via include). nginx's add_header does NOT inherit
  # into a child location that defines its own add_header, so this include is
  # also repeated inside every concrete location below.
  include /etc/nginx/conf.d/security-headers.conf;

  root /usr/share/nginx/html;
  index index.html;
  autoindex off;

  # Hashed static assets (JS/CSS) — immutable, cache 1 year
  location /assets/ {
    include /etc/nginx/conf.d/security-headers.conf;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  # Proxy image requests to the backend — cache 1 day
  location /images/ {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1d;
    add_header Cache-Control "public" always;
    limit_req zone=images burst=40 nodelay;
  }

  # Blog RSS feed - proxied from backend, served at the public root so feeds
  # land on https://miedaria-paunilor.ro/blog/rss.xml without falling into the
  # SPA fallback.
  location = /blog/rss.xml {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000/blog/rss.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Legacy /home URL — permanently redirect to canonical "/"
  location = /home {
    return 301 /;
  }

  # Legacy unprefixed paths from before the /:lang routing refactor — 301 into
  # /ro/... so previously-indexed inbound links survive. The optional second
  # capture preserves trailing slug/id segments (e.g. /shop/abc -> /ro/shop/abc).
  location ~ ^/(shop|blog|about-us|contact|cart)(/.*)?$ {
    return 301 /ro/$1$2;
  }

  # RFC 9116 well-known endpoints — plain text, must not hit SPA fallback
  location ^~ /.well-known/ {
    include /etc/nginx/conf.d/security-headers.conf;
    default_type text/plain;
    try_files $uri =404;
  }

  # Root-only language redirect. Mirrors PrefixWithLangRedirect in main.tsx so
  # crawlers and first-paint hits get the right /:lang prefix without booting
  # the SPA. 302 (not 301) because the choice depends on a cookie that can
  # change between visits.
  location = / {
    return 302 /$preferred_lang;
  }

  # SPA fallback — must-revalidate so deploys don't get stuck on cached index.html
  location / {
    include /etc/nginx/conf.d/security-headers.conf;
    try_files $uri /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # Health check endpoint
  location /health {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Admin image upload — only path that legitimately needs a large request body.
  # Compression off: BREACH-class attacks need a compressed authenticated
  # response with attacker-controlled input; admin endpoints meet the criteria.
  location /api/admin/images {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
    gzip off;
    brotli off;
    add_header Cache-Control "no-store" always;
    limit_req zone=api burst=20 nodelay;
  }

  # All other admin endpoints — JSON CRUD; compression disabled (BREACH).
  location /api/admin/ {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    gzip off;
    brotli off;
    add_header Cache-Control "no-store" always;
    limit_req zone=api burst=20 nodelay;
  }

  # Public API — no store
  location /api/ {
    include /etc/nginx/conf.d/security-headers.conf;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
    limit_req zone=api burst=20 nodelay;
  }
}

# HTTPS server - www -> apex 301. Reuses the same cert (production cert must
# carry both SANs).
server {
  listen 8443 ssl;
  http2 on;
  server_name www.miedaria-paunilor.ro;
  server_tokens off;

  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;

  return 301 https://miedaria-paunilor.ro$request_uri;
}
