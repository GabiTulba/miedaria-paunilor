# 2-year HSTS for production. For dev with self-signed certs, comment out the
# HSTS line below or shorten max-age to 300 — once a browser has cached HSTS
# for localhost, you cannot visit any localhost service over HTTP for the
# remainder of max-age.
add_header Strict-Transport-Security "max-age=63072000" always;

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content-Security-Policy. 'unsafe-inline' on style-src is required because
# Vite/React inject inline style attributes; tightening that requires a build-
# time nonce/hash pipeline. img-src allows data: + blob: for the SPA's image
# preview flow; connect-src 'self' covers the same-origin /api/ calls.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

# Disable powerful browser features the app does not use, to shrink the
# fingerprintable surface and prevent third-party iframes (none today, but
# defense-in-depth) from triggering them.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
