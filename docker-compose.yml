

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - react-rust
    env_file:
      - ./frontend/.env

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    networks:
      - react-rust
      - rust-postgres
    env_file:
      - ./backend/.env

  database:
    build: ./database
    ports:
      - "5432:5432"
    networks:
      - rust-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - ./database/.env

networks:
  react-rust:
  rust-postgres:

volumes:
  postgres-data:
